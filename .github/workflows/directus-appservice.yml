name: Directus (App Service)

on:
  push:
    branches:
      - master
    paths:
      - 'Directus/**'
      - '.github/workflows/directus-appservice.yml'
  workflow_dispatch:

env:
  AZURE_APPSERVICE_NAME: ${{ secrets.AZURE_APPSERVICE_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    name: Deploy Directus to App Service
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Prepare deployment package
        run: |
          cd Directus
          # Copy setup.js and package.json for App Service startup
          ls -la setup.js package.json
          echo "✓ Files ready for deployment"

      - name: Deploy to App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_APPSERVICE_NAME }}
          package: Directus/

      - name: Wait for App Service startup
        run: |
          echo "Waiting for App Service to start..."
          for i in {1..60}; do
            STATUS=$(az webapp show -n ${{ env.AZURE_APPSERVICE_NAME }} -g ${{ env.AZURE_RESOURCE_GROUP }} --query 'state' -o tsv)
            if [ "$STATUS" = "Running" ]; then
              echo "✓ App Service is running (attempt $i)"
              break
            fi
            echo "Attempt $i/60: Status is $STATUS"
            sleep 3
          done

      - name: Check Directus health
        run: |
          echo "Checking Directus health endpoint..."
          for i in {1..30}; do
            RESPONSE=$(curl -s -w "\n%{http_code}" https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net/server/health)
            HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
            BODY=$(echo "$RESPONSE" | head -n-1)

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Directus health check passed (attempt $i)"
              echo "Response: $BODY"
              exit 0
            fi

            echo "Attempt $i/30: HTTP $HTTP_CODE"
            sleep 2
          done

          echo "❌ Directus health check failed after 30 attempts"
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "App Service: https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net"
          echo "Admin Panel: https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net/admin"
          echo ""
          echo "⚠️ WARNING: App Service Free tier (F1) has 60 min/day compute limit"
          echo "For production 24/7 availability, upgrade to B1 Basic tier"

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed. Check Azure Portal > App Service > Activity Log for details"
          exit 1
