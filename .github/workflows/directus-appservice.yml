name: Directus (App Service - Docker)

on:
  push:
    branches:
      - master
    paths:
      - 'Directus/**'
      - '.github/workflows/directus-appservice.yml'
  workflow_dispatch:

env:
  AZURE_APPSERVICE_NAME: ${{ secrets.AZURE_APPSERVICE_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  deploy:
    name: Restart App Service (Pull Latest Directus Image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Restart App Service (pulls latest Docker image)
        run: |
          az webapp restart \
            --name ${{ env.AZURE_APPSERVICE_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }}
          echo "✓ App Service restarted - pulling latest Directus image"

      # Control-plane gate: the ARM resource reports "Running". Necessary but
      # NOT sufficient - it says the site is provisioned, not that the
      # container inside it is serving. The liveness probe below covers that.
      - name: Wait for App Service to report Running
        run: |
          echo "Waiting for App Service to start..."
          for i in {1..60}; do
            STATUS=$(az webapp show \
              -n ${{ env.AZURE_APPSERVICE_NAME }} \
              -g ${{ env.AZURE_RESOURCE_GROUP }} \
              --query 'state' -o tsv)
            if [ "$STATUS" = "Running" ]; then
              echo "✓ App Service is running (attempt $i)"
              exit 0
            fi
            echo "Attempt $i/60: Status is $STATUS"
            sleep 3
          done
          # Previously this loop just fell through, so a site that never
          # started still passed the step and failed confusingly later.
          echo "❌ App Service never reached 'Running' after 60 attempts (~3 min)"
          exit 1

      # LIVENESS probe: /server/ping is public and only proves the Directus
      # process answers HTTP. It is deliberately NOT /server/health - Directus
      # 12.x denies that to the public role (403), and we hold no admin token
      # at this stage. The DEEP readiness check (database/cache/storage) runs
      # in the bootstrap job below, inside setup.js, which does have the token.
      - name: Wait for Directus to answer (liveness probe)
        run: |
          URL="https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net/server/ping"
          echo "Probing $URL ..."
          # 60 x 3s = ~3 min. A Directus container cold start on the F1/Free
          # tier (no always-on) regularly exceeds the old 60s budget.
          for i in {1..60}; do
            HTTP_CODE=$(curl -s -o /tmp/ping_body -w "%{http_code}" "$URL" || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ Directus is answering (attempt $i)"
              echo "Response: $(cat /tmp/ping_body)"
              exit 0
            fi

            echo "Attempt $i/60: HTTP $HTTP_CODE"
            sleep 3
          done

          echo "❌ Directus did not answer /server/ping after 60 attempts (~3 min)"
          echo "Last response body:"; cat /tmp/ping_body || true
          exit 1

      # READINESS probe: /server/health is the DEEP check - it reports the
      # database, cache and storage state, unlike /server/ping which only
      # proves the process answers. Directus 12.x denies it to the public role,
      # so it needs the admin token; this job's OIDC identity holds "Key Vault
      # Secrets User" on the vault, so it can read that token directly.
      #
      # This lives here (not in the bootstrap job) so THIS job fully owns the
      # question "is Directus deployed and healthy?". The bootstrap job then
      # only owns "put content in". A red job now tells you which of the two
      # actually broke. setup.js keeps its own equivalent check for when it's
      # run standalone (e.g. local `docker compose`), where this job does not
      # exist.
      - name: Verify Directus is healthy (readiness probe)
        env:
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
        run: |
          set -euo pipefail
          URL="https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net/server/health"

          # Fail fast and clearly if the data-plane role is missing - Contributor
          # on the subscription does NOT grant secret reads on an RBAC vault.
          if ! TOKEN=$(az keyvault secret show \
                --vault-name "$AZURE_KEY_VAULT_NAME" \
                --name admin-token \
                --query value -o tsv 2>/tmp/kv_err); then
            echo "❌ Could not read 'admin-token' from Key Vault '$AZURE_KEY_VAULT_NAME'."
            echo "   The GitHub OIDC identity needs the 'Key Vault Secrets User' role on that vault."
            cat /tmp/kv_err
            exit 1
          fi

          echo "Probing $URL ..."
          # NOTE: /server/health follows the health-check response format and is
          # NOT wrapped in Directus's usual {"data": ...} envelope - the fields
          # are top-level: {"status","releaseId","serviceId","checks"}.
          # 40 x 3s = ~2 min. Covers a database still accepting its first
          # connections after a cold container start.
          for i in {1..40}; do
            HTTP_CODE=$(curl -s -o /tmp/health_body -w "%{http_code}" \
              -H "Authorization: Bearer $TOKEN" "$URL" || echo "000")
            STATUS=$(jq -r '.status // empty' /tmp/health_body 2>/dev/null || echo "")

            if [ "$HTTP_CODE" = "200" ] && [ "$STATUS" = "ok" ]; then
              echo "✓ Directus is healthy (attempt $i)"
              exit 0
            fi

            # "warn" = a dependency is degraded but functional; Directus is
            # serving. This is EXPECTED here: Azure SQL Basic regularly exceeds
            # the 150ms mssql:responseTime threshold, so gating strictly on
            # "ok" would never pass. Surface it, don't block.
            if [ "$HTTP_CODE" = "200" ] && [ "$STATUS" = "warn" ]; then
              DEGRADED=$(jq -r '[.checks | to_entries[] | .key as $k | .value[] | select(.status != "ok") | "\($k)=\(.status)"] | join(", ")' /tmp/health_body 2>/dev/null || echo "unknown")
              echo "::warning::Directus healthy but degraded (status=warn): ${DEGRADED}"
              exit 0
            fi

            echo "Attempt $i/40: HTTP $HTTP_CODE status=${STATUS:-none}"
            sleep 3
          done

          echo "❌ Directus answers, but never became healthy (~2 min)."
          echo "Last health response:"; cat /tmp/health_body || true
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "App Service: https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net"
          echo "Admin Panel: https://${{ env.AZURE_APPSERVICE_NAME }}.azurewebsites.net/admin"
          echo ""
          echo "⚠️ WARNING: App Service Free tier (F1) has 60 min/day compute limit"
          echo "For production 24/7 availability, upgrade to B1 Basic tier"

      - name: Deployment failed
        if: failure()
        run: |
          echo "❌ Deployment failed. Check Azure Portal > App Service > Activity Log for details"
          exit 1

  bootstrap:
    name: Bootstrap Directus (setup.js)
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Directus/package-lock.json'

      - name: Install dependencies
        working-directory: Directus
        run: npm ci

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # setup.js creates collections, grants public read/create permissions,
      # seeds content (only if empty), and creates/re-syncs the contact-email
      # Flow. Fully idempotent.
      #
      # It reads the Directus admin token from Key Vault via
      # DefaultAzureCredential, which resolves the az login session established
      # above. The OIDC principal must hold "Key Vault Secrets User" on the
      # vault - a DATA-plane role; Contributor is control-plane only and is NOT
      # enough. That grant is applied manually in the Azure Portal, not by
      # Terraform.
      #
      # Separation of concerns: the job above owns "is Directus deployed and
      # healthy?" (liveness + readiness). This job owns only "put the content
      # in". So if this job goes red, it's a bootstrap/content problem - not an
      # infrastructure one. setup.js still repeats its own health check
      # internally, which is intentional: it must stay safe to run standalone
      # (local `docker compose`), where the job above doesn't exist. That costs
      # one extra HTTP call here and buys a script that's correct anywhere.
      - name: Run Directus bootstrap (setup.js)
        working-directory: Directus
        env:
          DIRECTUS_URL: ${{ secrets.AZURE_APPSERVICE_URL }}
          AZURE_KEY_VAULT_NAME: ${{ secrets.AZURE_KEY_VAULT_NAME }}
        run: node setup.js
