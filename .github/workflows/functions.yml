name: Functions (Azure)

on:
  push:
    branches:
      - master
    paths:
      - 'functions/**'
      - '.github/workflows/functions.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'functions/**'
  workflow_dispatch:

env:
  AZURE_FUNCTIONS_APP_NAME: ${{ secrets.AZURE_FUNCTIONS_APP_NAME }}
  AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}

jobs:
  build:
    name: Build Functions
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'functions/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Prune to production dependencies
        run: npm prune --production

      - name: Package function app
        run: |
          mkdir -p dist
          zip -r dist/functions.zip . -x "dist/*" -x "local.settings.json*"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: functions-build
          path: functions/dist/functions.zip
          retention-days: 5

  deploy:
    name: Deploy to Azure Functions
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: functions-build
          path: ./functions-dist

      - name: Azure Login (OIDC)
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions (zip deploy)
        run: |
          az functionapp deployment source config-zip \
            --name "${{ env.AZURE_FUNCTIONS_APP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --src ./functions-dist/functions.zip

      - name: Verify deployment
        run: |
          FUNC_URL=$(az functionapp show -n "${{ env.AZURE_FUNCTIONS_APP_NAME }}" -g "${{ env.AZURE_RESOURCE_GROUP }}" --query defaultHostName -o tsv)
          echo "Functions deployed to: https://$FUNC_URL"
          curl -f -I "https://$FUNC_URL" || echo "Warning: Could not verify deployment URL"
